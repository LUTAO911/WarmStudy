name: Agent CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop, wcy, MOXI ]
    paths:
      - 'agent/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop, wcy, MOXI ]
    paths:
      - 'agent/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: false
        default: 'MOXI'

jobs:
  lint:
    name: Lint & Type Check (Advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agent/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy isort

      - name: Run Black
        working-directory: agent
        run: |
          git ls-files '*.py' | xargs black --check --diff

      - name: Run isort
        working-directory: agent
        run: |
          git ls-files '*.py' | xargs isort --check-only --diff

      - name: Run flake8
        working-directory: agent
        run: |
          git ls-files '*.py' | xargs flake8

      - name: Run mypy
        working-directory: agent
        run: |
          mypy agent --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agent/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          pip install -e ./agent

      - name: Compile Python modules
        working-directory: agent
        run: |
          python -m compileall -q app.py api_gateway.py embeddings.py loader.py ocr.py redis_client.py vectorstore.py agent

      - name: Run tests with coverage
        run: |
          pytest agent/tests/ -v --cov=agent --cov-report=xml --cov-report=html --cov-report=term

  security:
    name: Security Scan (Advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit
        run: |
          bandit -r agent/ -f json -o bandit_report.json

      - name: Run Safety Check
        run: |
          safety check -r agent/requirements.txt

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          cd agent && python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: agent/dist/

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - name: Check quality gate
        run: |
          echo "Required checks passed!"
          echo "Tests: Passed"
          echo "Build: Passed"
          echo "Lint and security scans run as advisory jobs."
          echo "Ready for deployment!"

  merge-check:
    name: Merge Requirements
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'pull_request'

    steps:
      - name: Verify merge eligibility
        run: |
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "PR Author: ${{ github.event.pull_request.user.login }}"
          echo "All checks passed - ready to merge!"
