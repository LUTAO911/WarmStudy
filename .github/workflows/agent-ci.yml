name: Agent CI/CD Pipeline

on:
  push:
    branches: [ main, develop, wcy ]
    paths:
      - 'agent/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop, wcy ]
    paths:
      - 'agent/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: false
        default: 'wcy'

defaults:
  run:
    working-directory: agent

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agent/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy pylint isort

      - name: Run Black
        run: |
          black --check --diff agent/ tests/ || true

      - name: Run isort
        run: |
          isort --check-only --diff agent/ tests/ || true

      - name: Run flake8
        run: |
          flake8 agent/ tests/ --max-line-length=100 --extend-ignore=E203,W503 || true

      - name: Run mypy
        run: |
          mypy agent/ --ignore-missing-imports || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agent/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=agent --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: github.event_name == 'push'
        with:
          files: agent/coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit
        run: |
          bandit -r agent/ -f json -o bandit_report.json || true

      - name: Run Safety Check
        run: |
          safety check || true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: agent/dist/

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security]

    steps:
      - name: Check quality gate
        run: |
          echo "All quality checks passed!"
          echo "Lint: Passed"
          echo "Tests: Passed"
          echo "Security: Passed"
          echo "Ready for deployment!"

  merge-check:
    name: Merge Requirements
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'pull_request'

    steps:
      - name: Verify merge eligibility
        run: |
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "PR Author: ${{ github.event.pull_request.user.login }}"
          echo "All checks passed - ready to merge!"
