[flake8]
max-line-length = 100
extend-ignore = E203, E266, E501, W503
exclude =
    .git,
    .venv,
    __pycache__,
    build,
    dist,
    *.egg-info,
    .pytest_cache
    data
per-file-ignores =
    __init__.py:F401

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
ignore_missing_imports = True

[mypy-tests.*]
ignore_errors = True

[pylint]
max-line-length = 100
disable =
    C0111,  # missing-docstring
    C0103,  # invalid-name
    R0903,  # too-few-public-methods
    R0913,  # too-many-arguments
    R0801,  # duplicate-code
ignore = __pycache__,*.pyc,build,dist,.git,.venv,data
confidence = HIGH,HIGH,HIGH,HIGH,MEDIUM

[pylint.format]
max-line-length = 100

[pylint.messages_control]
disable = missing-docstring,invalid-name,too-few-public-methods

[pycodestyle]
max-line-length = 100
exclude = .git,.venv,__pycache__,build,dist,data

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

[coverage:run]
source = agent
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov