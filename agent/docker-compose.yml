version: '3.8'

services:
  rag:
    build: .
    container_name: nuanxuebang-rag
    ports:
      - "5177:5177"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./config:/app/config:ro
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5177/api/agent/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
