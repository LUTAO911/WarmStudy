<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖学帮 - 心理支持测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .ai-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .ai-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .ai-info span {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .mode-tabs {
            display: flex;
            background: #f5f5f5;
            padding: 15px 20px;
            gap: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .mode-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            white-space: pre-wrap;
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .message.crisis {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }
        
        .message-meta {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
        
        .emotion-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .emotion-happy { background: #d4edda; color: #155724; }
        .emotion-sad { background: #cce5ff; color: #004085; }
        .emotion-anxious { background: #fff3cd; color: #856404; }
        .emotion-angry { background: #f8d7da; color: #721c24; }
        .emotion-neutral { background: #e2e3e5; color: #383d41; }
        
        .crisis-warning {
            background: #dc3545;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .quick-questions {
            padding: 15px 20px;
            border-top: 1px solid #eee;
        }
        
        .quick-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        
        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .quick-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 15px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .status-bar {
            padding: 15px 20px;
            background: #f8f8f8;
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }
        
        .info-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .info-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .info-item {
            padding: 12px;
            background: #f8f8f8;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .info-item label {
            color: #999;
            display: block;
            margin-bottom: 4px;
        }
        
        .info-item span {
            color: #333;
            font-weight: 500;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
        }
        
        .loading-dot {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 暖学帮 - 心理支持测试</h1>
            <p>基于青少年心理关怀AI系统</p>
        </div>
        
        <div class="chat-container">
            <div class="chat-header">
                <div class="ai-avatar">🤗</div>
                <div class="ai-info">
                    <h2>暖暖</h2>
                    <span id="aiStatus">在线 · 随时倾听你的心声</span>
                </div>
            </div>
            
            <div class="mode-tabs">
                <div class="mode-tab active" data-mode="psychology">🌸 心理陪伴</div>
                <div class="mode-tab" data-mode="student">👨‍🎓 学生模式</div>
                <div class="mode-tab" data-mode="parent">👨‍👩‍👧 家长模式</div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    你好，我是暖暖 🌸
                    <div class="message-meta">有什么想聊的都可以告诉我哦</div>
                </div>
            </div>
            
            <div class="quick-questions">
                <div class="quick-label">快捷问题：</div>
                <div class="quick-btns">
                    <button class="quick-btn" onclick="sendQuickQuestion('最近学习压力很大')">学习压力</button>
                    <button class="quick-btn" onclick="sendQuickQuestion('和同学闹矛盾了')">人际关系</button>
                    <button class="quick-btn" onclick="sendQuickQuestion('考试前特别紧张')">考试焦虑</button>
                    <button class="quick-btn" onclick="sendQuickQuestion('心情很低落')">情绪低落</button>
                    <button class="quick-btn" onclick="sendQuickQuestion('家长总是不理解我')">亲子沟通</button>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="输入你想说的话..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
            
            <div class="status-bar">
                <span id="lastResponse"></span>
                <span>响应模式：<span id="currentMode">心理陪伴</span></span>
            </div>
        </div>
        
        <div class="info-section">
            <h3>📊 当前状态</h3>
            <div class="info-grid">
                <div class="info-item">
                    <label>情绪识别</label>
                    <span id="lastEmotion">-</span>
                </div>
                <div class="info-item">
                    <label>危机等级</label>
                    <span id="lastCrisis">-</span>
                </div>
                <div class="info-item">
                    <label>对话类型</label>
                    <span id="lastType">-</span>
                </div>
                <div class="info-item">
                    <label>响应时间</label>
                    <span id="lastTime">-</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentMode = 'psychology';
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // 模式切换
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = tab.dataset.mode;
                document.getElementById('currentMode').textContent = tab.textContent;
            });
        });
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function addMessage(content, role, meta = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            let html = content;
            if (meta.emotion) {
                html += `<span class="emotion-tag emotion-${meta.emotion}">${meta.emotion}</span>`;
            }
            if (meta.isCrisis) {
                html = `<div class="crisis-warning">⚠️ 危机预警 - ${meta.crisisLevel}</div>` + html;
            }
            if (meta.time) {
                html += `<div class="message-meta">${meta.time}</div>`;
            }
            
            msgDiv.innerHTML = html;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return msgDiv;
        }
        
        function setLoading(loading) {
            sendBtn.disabled = loading;
            sendBtn.textContent = loading ? '发送中...' : '发送';
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || sendBtn.disabled) return;
            
            setLoading(true);
            
            // 添加用户消息
            addMessage(text, 'user', { time: new Date().toLocaleTimeString() });
            messageInput.value = '';
            
            // 添加加载指示器
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai loading';
            loadingDiv.innerHTML = '<span class="loading-dot">●</span><span class="loading-dot">●</span><span class="loading-dot">●</span>';
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                const startTime = Date.now();
                
                const response = await fetch('/api/student/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: 'web_test_user',
                        message: text
                    })
                });
                
                const data = await response.json();
                const responseTime = Date.now() - startTime;
                
                // 移除加载指示器
                messagesDiv.removeChild(loadingDiv);
                
                if (data.success) {
                    // 添加AI回复
                    const isCrisis = data.type === 'crisis_intervention';
                    addMessage(data.response, 'ai', {
                        emotion: data.emotion,
                        isCrisis: isCrisis,
                        crisisLevel: data.crisis_level,
                        time: `${new Date().toLocaleTimeString()} · ${responseTime}ms`
                    });
                    
                    // 更新状态栏
                    document.getElementById('lastEmotion').textContent = data.emotion || '-';
                    document.getElementById('lastCrisis').textContent = data.crisis_level || 'safe';
                    document.getElementById('lastType').textContent = data.type || '-';
                    document.getElementById('lastTime').textContent = `${responseTime}ms`;
                    document.getElementById('lastResponse').textContent = `最后响应: ${new Date().toLocaleTimeString()}`;
                } else {
                    addMessage('抱歉，出了点问题。请稍后再试。', 'ai');
                }
            } catch (error) {
                messagesDiv.removeChild(loadingDiv);
                addMessage('网络错误，请检查后端服务是否启动。', 'ai');
            }
            
            setLoading(false);
        }
        
        function sendQuickQuestion(question) {
            messageInput.value = question;
            sendMessage();
        }
    </script>
</body>
</html>
