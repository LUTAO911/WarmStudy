# 暖学帮项目 Docker Compose 配置
version: '3.8'

name: nuanxuebang

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nuanxuebang-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/nuanxuebang.db
      - VECTOR_DB_PATH=./vector_db
      - KNOWLEDGE_BASE_PATH=./knowledge
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/knowledge:/app/knowledge
      - ./backend/vector_db:/app/vector_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nuanxuebang-network

  # RAG知识库管理界面
  rag-admin:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nuanxuebang-rag-admin
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000/api
    command: streamlit run web/rag_admin.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nuanxuebang-network

networks:
  nuanxuebang-network:
    driver: bridge
